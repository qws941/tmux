name: "📋 이슈 등록"
description: 버그, 기능 요청, 유지보수, 문서 등 모든 이슈를 등록합니다.
labels: []
assignees: [qws941]
body:
  - type: markdown
    attributes:
      value: |
        이슈를 등록해 주세요. 유형과 우선순위를 선택하고 상세 내용을 작성합니다.

  - type: dropdown
    id: type
    attributes:
      label: 유형
      description: 이슈의 유형을 선택하세요.
      options:
        - 🐛 버그
        - ✨ 기능 요청
        - 🔧 유지보수
        - 📝 문서
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 이슈의 우선순위를 선택하세요.
      options:
        - 🔴 긴급 (P0)
        - 🟠 높음 (P1)
        - 🟡 보통 (P2)
        - 🟢 낮음 (P3)
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: 요약
      description: 이슈를 한 줄로 요약하세요.
      placeholder: 간결하게 작성해 주세요.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 상세 설명
      description: 이슈에 대한 상세한 설명을 작성하세요.
      placeholder: |
        - 현재 동작:
        - 기대 동작:
        - 재현 방법:
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: 관련 로그, 스크린샷, 환경 정보 등을 첨부하세요.
    validations:
      required: false
