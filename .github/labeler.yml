# Auto-label configuration for actions/labeler
# Maps file path patterns to PR labels
# Labels MUST exist in scripts/labels.yml (SSoT) to be applied downstream
# This is a GENERIC config — repos can override with their own .github/labeler.yml

# Documentation changes
type:docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'
          - 'README*'
          - 'CHANGELOG*'

# CI/CD changes
type:ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '*.yml'
          - '*.yaml'
          - 'Makefile'

# Infrastructure changes (Terraform, Docker, deployment)
type:infra:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.tf'
          - '**/*.tfvars'
          - '**/.terraform.lock.hcl'
          - '**/Dockerfile*'
          - '**/docker-compose*.yml'
          - '**/.dockerignore'

# Security-related changes
type:security:
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY*'
          - '**/security/**'
          - '**/*secret*'
          - '**/*credential*'

# Test changes
type:test:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*_test.go'
          - '**/*.test.ts'
          - '**/*.test.js'
          - '**/*.spec.ts'
          - '**/*.spec.js'
          - '**/test/**'
          - '**/tests/**'
          - '**/__tests__/**'
