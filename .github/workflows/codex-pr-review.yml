# Codex PR Review
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _codex-pr-review.yml
#
# Requires: Codex GitHub App installed with OAuth
name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    uses: qws941/.github/.github/workflows/_codex-pr-review.yml@master
    secrets: inherit  # pragma: allowlist secret
