# CI Notify Failure
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _ci-notify-failure.yml
#
# Creates a GitHub Issue when the CI workflow ends in an unhealthy state.
# Automatically closes the issue when the same workflow recovers (success).
# Customize the 'workflows' list per-repo if your CI workflow has a different name.

name: CI Notify Failure

on:
  workflow_run:
    workflows: ['CI', 'CI Validation Pipeline', 'Node.js CI', 'Agents League CI']
    types: [completed]

concurrency:
  group: ci-notify-failure-${{ github.event.workflow_run.name }}
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  notify:
    uses: qws941/.github/.github/workflows/_ci-notify-failure.yml@master
    secrets: inherit
