# Auto Merge
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _auto-merge.yml
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with admin bypass permissions

name: Auto Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    uses: qws941/.github/.github/workflows/_auto-merge.yml@master
    secrets: inherit
