# Branch Cleanup
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _branch-cleanup.yml

name: Branch Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

concurrency:
  group: branch-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: qws941/.github/.github/workflows/_branch-cleanup.yml@master
    secrets: inherit  # pragma: allowlist secret
