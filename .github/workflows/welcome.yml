# Welcome first-time contributors
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml → Group 1

name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome! 👋 Thanks for opening your first issue in this repository.
            A maintainer will review it shortly.
          pr-message: |
            Welcome! 👋 Thanks for your first pull request to this repository.
            A maintainer will review it shortly. Please make sure your PR follows the [contributing guidelines](../blob/master/CONTRIBUTING.md).
