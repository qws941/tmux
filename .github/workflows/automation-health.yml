name: Automation Health

on:
  workflow_run:
    workflows:
      - 'Auto Approve Runs'
      - 'Auto Merge'
      - 'Branch Cleanup'
      - 'CI Notify Failure'
      - 'Codex Auto-Issue'
      - 'Codex Issue Timeout'
      - 'Codex PR Normalize'
      - 'Codex PR Review'
      - 'Codex Triage'
      - 'Commit Lint'
      - 'Dependabot Auto-Fix'
      - 'Issue Auto-Label'
      - 'Issue Lifecycle'
      - 'PR Labeler'
      - 'PR Size'
      - 'Release Drafter'
      - 'Stale'
      - 'Welcome'
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  issues: write

concurrency:
  group: automation-health-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'skipped' }}
    uses: qws941/.github/.github/workflows/_automation-health.yml@master
    with:
      workflow-names: ${{ vars.AUTOMATION_HEALTH_WORKFLOWS != '' && vars.AUTOMATION_HEALTH_WORKFLOWS || 'Auto Approve Runs,Auto Merge,Branch Cleanup,CI Notify Failure,Codex Auto-Issue,Codex Issue Timeout,Codex PR Normalize,Codex PR Review,Codex Triage,Commit Lint,Dependabot Auto-Fix,Issue Auto-Label,Issue Lifecycle,PR Labeler,PR Size,Release Drafter,Stale,Welcome' }}
      title-prefix: ${{ vars.AUTOMATION_HEALTH_TITLE_PREFIX != '' && vars.AUTOMATION_HEALTH_TITLE_PREFIX || '[Automation Health] degraded' }}
      issue-labels: ${{ vars.AUTOMATION_HEALTH_ISSUE_LABELS != '' && vars.AUTOMATION_HEALTH_ISSUE_LABELS || 'type:ci,priority:medium' }}
      unhealthy-conclusions: ${{ vars.AUTOMATION_HEALTH_UNHEALTHY_CONCLUSIONS != '' && vars.AUTOMATION_HEALTH_UNHEALTHY_CONCLUSIONS || 'failure,timed_out,action_required,cancelled' }}
      treat-missing-as-unhealthy: ${{ vars.AUTOMATION_HEALTH_TREAT_MISSING_AS_UNHEALTHY != '' && vars.AUTOMATION_HEALTH_TREAT_MISSING_AS_UNHEALTHY || true }}
    secrets: inherit
