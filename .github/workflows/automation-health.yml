# Automation Health
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _automation-health.yml

name: Automation Health

on:
  workflow_dispatch:

permissions:
  actions: read
  issues: write

concurrency:
  group: automation-health
  cancel-in-progress: true

jobs:
  check:
    uses: qws941/.github/.github/workflows/_automation-health.yml@master
    with:
      workflow-names: ${{ vars.AUTOMATION_HEALTH_WORKFLOWS != '' && vars.AUTOMATION_HEALTH_WORKFLOWS || 'Auto Approve Runs,Auto Merge,Branch Cleanup,CI Notify Failure,Commit Lint,Dependabot Auto-Fix,Issue Auto-Label,Issue Duplicate Detection,Issue Lifecycle,Issue Project,Issue SLA,Lock Threads,OpenCode Agent Timeout,OpenCode Issue Sync,OpenCode PR Sync,OpenCode Writeback,PR Labeler,PR Normalize,PR Size,Release Drafter,Stale,Welcome' }}
      title-prefix: ${{ vars.AUTOMATION_HEALTH_TITLE_PREFIX != '' && vars.AUTOMATION_HEALTH_TITLE_PREFIX || '[Automation Health] degraded' }}
      issue-labels: ${{ vars.AUTOMATION_HEALTH_ISSUE_LABELS != '' && vars.AUTOMATION_HEALTH_ISSUE_LABELS || 'type:ci,priority:medium' }}
      unhealthy-conclusions: ${{ vars.AUTOMATION_HEALTH_UNHEALTHY_CONCLUSIONS != '' && vars.AUTOMATION_HEALTH_UNHEALTHY_CONCLUSIONS || 'failure,timed_out,action_required,cancelled' }}
      treat-missing-as-unhealthy: ${{ vars.AUTOMATION_HEALTH_TREAT_MISSING_AS_UNHEALTHY != '' && vars.AUTOMATION_HEALTH_TREAT_MISSING_AS_UNHEALTHY || false }}
    secrets: inherit
