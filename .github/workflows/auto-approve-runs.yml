# Auto Approve Runs
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _auto-approve-runs.yml
#
# Event-driven: fires on workflow_run completion so action_required runs
# from external actors (Codex bot) are rerun immediately.
# workflow_run triggers execute in default branch context — immune to
# the action_required deadlock that blocks pull_request_target workflows.
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with actions:write

name: Auto Approve Runs

on:
  workflow_run:
    workflows:
      - CI
      - Commit Lint
      - PR Size
      - PR Labeler
      - Issue Lifecycle
      - Codex PR Review
      - Codex PR Normalize
      - Auto Merge
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write

jobs:
  approve:
    # Only run when a workflow completed with action_required, or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'action_required'
    uses: qws941/.github/.github/workflows/_auto-approve-runs.yml@master
    secrets: inherit
