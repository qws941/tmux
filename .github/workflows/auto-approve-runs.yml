# Auto Approve Runs
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _auto-approve-runs.yml
#
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with actions:write

name: Auto Approve Runs

on:
  workflow_run:
    workflows:
      - 'Auto Merge'
    types: [requested, completed]
  workflow_dispatch:

concurrency:
  group: auto-approve-runs-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  approve:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.action == 'requested' || github.event.workflow_run.conclusion == 'action_required' || github.event.workflow_run.conclusion == 'failure' }}
    uses: qws941/.github/.github/workflows/_auto-approve-runs.yml@master
    secrets: inherit
