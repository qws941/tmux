# Auto Approve Runs
# SSoT: qws941/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _auto-approve-runs.yml
#
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with actions:write

name: Auto Approve Runs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: auto-approve-runs-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  approve:
    if: ${{ github.event_name != 'pull_request_target' || github.event.pull_request.draft == false }}
    uses: qws941/.github/.github/workflows/_auto-approve-runs.yml@master
    secrets: inherit
